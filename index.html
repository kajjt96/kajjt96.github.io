<!DOCTYPE html>
<html>
    <head>
        <title>WARNING</title>
        <script>
            function toggleMode() {
                document.body.classList.toggle("toggle-mode");
            }
        </script>
        <style>
            body {
                background-color: black;
                color: white;
                
                display: flex;
                min-height: 100vh;
                align-items: center;
                justify-content: center;
            }
            .toggle-mode {
                background-color: white;
                color: black;
            }
        </style>    
    </head>
    <body>
        <div>
            <button onclick="toggleMode()">DO NOT PUSH</button>
        </div>
    </body>
</html>
